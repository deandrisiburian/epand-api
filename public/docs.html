<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>EpannAPIs Docs - Interactive REST API Documentation</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <meta name="theme-color" content="#facc15" />
  <style>
    body {
      background-color: #f4f1ea;
      background-image:
        radial-gradient(circle at 1px 1px, rgba(0,0,0,.10) 1px, transparent 0);
      background-size: 24px 24px;
    }

    .neo-card {
      background: #fff;
      border: 4px solid #000;
      box-shadow: 10px 10px 0 #000;
      transition: transform .15s ease, box-shadow .15s ease;
    }

    .neo-card:hover {
      transform: translate(-2px, -2px);
      box-shadow: 14px 14px 0 #000;
    }

    .neo-btn {
      border: 4px solid #000;
      box-shadow: 6px 6px 0 #000;
      transition: transform .15s ease, box-shadow .15s ease, background-color .15s ease;
    }

    .neo-btn:hover {
      transform: translate(-2px, -2px);
      box-shadow: 8px 8px 0 #000;
    }

    .neo-btn:active {
      transform: translate(0, 0);
      box-shadow: 4px 4px 0 #000;
    }

    .neo-input {
      border: 4px solid #000;
      box-shadow: 4px 4px 0 #000;
      background: #fff;
      transition: transform .15s ease, box-shadow .15s ease;
    }

    .neo-input:focus {
      transform: translate(-2px, -2px);
      box-shadow: 6px 6px 0 #000;
      outline: none;
    }

    .neo-badge {
      border: 3px solid #000;
      box-shadow: 3px 3px 0 #000;
    }

    .neo-code {
      background: #111827;
      color: #86efac;
      border: 4px solid #000;
      box-shadow: 8px 8px 0 #000;
    }

    .method-get { background: #86efac; color: #000; }
    .method-post { background: #67e8f9; color: #000; }
    .method-delete { background: #fb7185; color: #000; }
    .method-put { background: #facc15; color: #000; }
    .method-default { background: #c4b5fd; color: #000; }

    .tag-yellow { background: #facc15; }
    .tag-cyan { background: #67e8f9; }
    .tag-pink { background: #f9a8d4; }
    .tag-green { background: #86efac; }
    .tag-orange { background: #fdba74; }
  </style>
</head>
<body class="text-black min-h-screen">

  <!-- NAVBAR -->
  <nav class="sticky top-0 z-50 border-b-4 border-black bg-[#f4f1ea]">
    <div class="max-w-7xl mx-auto px-6 py-4 flex flex-col md:flex-row md:items-center md:justify-between gap-4">
      <div>
        <a href="/" class="flex items-center gap-3">
          <div class="w-11 h-11 rounded-2xl bg-[#facc15] border-4 border-black shadow-[4px_4px_0_#000] flex items-center justify-center">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6 text-black" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
              <path stroke-linecap="round" stroke-linejoin="round" d="M13 10V3L4 14h7v7l9-11h-7z" />
            </svg>
          </div>
          <div>
            <span class="text-xl font-black tracking-tight">EpannAPIs Docs</span>
            <p class="text-xs font-bold text-black/60 leading-none mt-0.5">Interactive REST API Documentation</p>
          </div>
        </a>
      </div>

      <div class="flex gap-3">
        <div class="relative flex-1 md:flex-none">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 absolute left-3 top-1/2 -translate-y-1/2 text-black/50" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-4.35-4.35M17 11A6 6 0 1 1 5 11a6 6 0 0 1 12 0z" />
          </svg>
          <input
            id="search-input"
            type="text"
            placeholder="Cari endpoint..."
            class="neo-input pl-10 pr-4 py-2 rounded-xl text-black placeholder:text-black/40 w-full md:w-72 font-bold"
          />
        </div>
        <a href="/" class="neo-btn flex items-center gap-2 px-4 py-2 rounded-xl bg-white font-bold whitespace-nowrap">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" />
          </svg>
          Home
        </a>
      </div>
    </div>
  </nav>

  <main class="max-w-7xl mx-auto px-6 py-10">

    <!-- HEADER INFO -->
    <section class="mb-10">
      <div class="neo-card rounded-3xl p-6 md:p-8 bg-white">
        <div class="flex items-center gap-3 mb-4">
          <span class="neo-badge tag-yellow rounded-full px-4 py-1 text-sm font-black uppercase tracking-wide">
            API Documentation
          </span>
          <span id="doc-version-badge" class="neo-badge bg-white rounded-full px-3 py-1 text-sm font-bold">
            v<span id="doc-version">-</span>
          </span>
        </div>
        
        <h1 id="doc-title" class="text-3xl md:text-5xl font-black mb-3 tracking-tight">Loading...</h1>
        <p id="doc-description" class="text-black/70 text-lg mb-6 font-medium">Memuat dokumentasi...</p>

        <div class="flex flex-wrap gap-4 text-sm font-bold">
          <div class="flex items-center gap-2 neo-badge bg-white rounded-full px-4 py-2">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
              <path stroke-linecap="round" stroke-linejoin="round" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10" />
            </svg>
            Version: <span id="doc-version-text" class="text-black font-black">-</span>
          </div>
          <div class="flex items-center gap-2 neo-badge bg-[#67e8f9] rounded-full px-4 py-2">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
              <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
              <path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.477 0 8.268 2.943 9.542 7-1.274 4.057-5.065 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
            </svg>
            Updated: <span id="doc-updated" class="text-black font-black">-</span>
          </div>
        </div>
      </div>
    </section>

    <!-- CATEGORY FILTERS -->
    <section class="mb-8">
      <div id="category-filters" class="flex flex-wrap gap-3"></div>
    </section>

    <!-- DOCS LIST -->
    <section id="docs-container" class="space-y-8"></section>
  </main>

  <!-- ENDPOINT CARD TEMPLATE -->
  <template id="endpoint-template">
    <div class="neo-card rounded-3xl p-6 endpoint-card bg-white">
      <div class="flex flex-col lg:flex-row lg:items-start lg:justify-between gap-4">
        <div class="flex-1">
          <div class="flex flex-wrap items-center gap-3 mb-3">
            <span class="method-badge text-sm font-black px-4 py-2 rounded-xl neo-badge uppercase tracking-wider"></span>
            <code class="endpoint-url text-sm md:text-base bg-gray-100 px-4 py-2 rounded-xl border-4 border-black font-mono font-bold break-all"></code>
          </div>

          <h3 class="endpoint-name text-2xl font-black mb-2 tracking-tight"></h3>
          <p class="endpoint-description text-black/70 mb-4 font-medium"></p>

          <div class="params-wrapper hidden">
            <h4 class="font-black mb-3 flex items-center gap-2 text-lg uppercase tracking-wide">
              <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                <path stroke-linecap="round" stroke-linejoin="round" d="M10 20l4-16m4 4l4 4-4 4M6 16l-4-4 4-4" />
              </svg>
              Parameters
            </h4>
            <div class="params-list grid md:grid-cols-2 gap-3"></div>
          </div>
        </div>

        <div class="flex gap-2 flex-wrap">
          <button class="copy-btn neo-btn flex items-center gap-2 px-4 py-2 rounded-xl bg-white font-bold">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
              <path stroke-linecap="round" stroke-linejoin="round" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z" />
            </svg>
            Copy
          </button>
          <button class="toggle-try-btn neo-btn flex items-center gap-2 px-4 py-2 rounded-xl bg-[#facc15] font-bold">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
              <path stroke-linecap="round" stroke-linejoin="round" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z" />
              <path stroke-linecap="round" stroke-linejoin="round" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
            </svg>
            Try API
          </button>
        </div>
      </div>

      <!-- TRY PANEL -->
      <div class="try-panel hidden mt-6 border-t-4 border-black pt-6">
        <div class="grid gap-4">
          <div class="dynamic-form grid md:grid-cols-2 gap-4"></div>

          <div class="flex flex-wrap gap-3">
            <button class="send-btn neo-btn flex items-center gap-2 px-5 py-3 rounded-xl bg-[#86efac] font-black">
              <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                <path stroke-linecap="round" stroke-linejoin="round" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8" />
              </svg>
              Send Request
            </button>
            <button class="clear-btn neo-btn flex items-center gap-2 px-5 py-3 rounded-xl bg-white font-bold">
              <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
              </svg>
              Clear
            </button>
          </div>

          <div>
            <p class="text-sm font-black mb-2 flex items-center gap-2 uppercase tracking-wide">
              <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                <path stroke-linecap="round" stroke-linejoin="round" d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1" />
              </svg>
              Request URL
            </p>
            <pre class="request-url neo-code rounded-2xl p-4 overflow-auto text-sm font-mono font-bold text-[#86efac]">-</pre>
          </div>

          <div>
            <p class="text-sm font-black mb-2 flex items-center gap-2 uppercase tracking-wide">
              <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                <path stroke-linecap="round" stroke-linejoin="round" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
              </svg>
              Response
            </p>
            <pre class="response-box neo-code rounded-2xl p-4 overflow-auto text-sm font-mono font-bold text-[#67e8f9] min-h-[120px]">Klik "Send Request" untuk mencoba endpoint.</pre>
          </div>
        </div>
      </div>
    </div>
  </template>

  <script>
    let API_DATA = null;
    let CURRENT_CATEGORY = 'all';

    const docsContainer = document.getElementById('docs-container');
    const categoryFilters = document.getElementById('category-filters');
    const searchInput = document.getElementById('search-input');
    const template = document.getElementById('endpoint-template');

    function methodBadgeClass(method) {
      const m = String(method).toUpperCase();
      if (m === 'GET')    return 'method-get';
      if (m === 'POST')   return 'method-post';
      if (m === 'DELETE') return 'method-delete';
      if (m === 'PUT')    return 'method-put';
      return 'method-default';
    }

    function createCategoryButtons(tags) {
      categoryFilters.innerHTML = '';
      const allBtn = document.createElement('button');
      allBtn.textContent = 'Semua';
      allBtn.className = getFilterButtonClass('all');
      allBtn.onclick = () => { CURRENT_CATEGORY = 'all'; rerender(); };
      categoryFilters.appendChild(allBtn);
      Object.keys(tags || {}).forEach(category => {
        const btn = document.createElement('button');
        btn.textContent = category;
        btn.className = getFilterButtonClass(category);
        btn.onclick = () => { CURRENT_CATEGORY = category; rerender(); };
        categoryFilters.appendChild(btn);
      });
    }

    function getFilterButtonClass(category) {
      const active = CURRENT_CATEGORY === category;
      const colors = ['tag-yellow', 'tag-cyan', 'tag-pink', 'tag-green', 'tag-orange'];
      const randomColor = colors[Math.abs(category.split('').reduce((a,b)=>a+b.charCodeAt(0),0)) % colors.length];
      
      if (active) {
        return `neo-btn px-4 py-2 rounded-xl ${randomColor} font-black capitalize border-4 border-black shadow-[6px_6px_0_#000]`;
      }
      return 'neo-btn px-4 py-2 rounded-xl bg-white font-bold capitalize border-4 border-black shadow-[6px_6px_0_#000] hover:shadow-[8px_8px_0_#000]';
    }

    function normalizeRoutes() {
      if (!API_DATA) return [];
      const result = [];
      Object.entries(API_DATA.tags || {}).forEach(([category, routes]) => {
        routes.forEach(route => result.push({ ...route, category }));
      });
      return result;
    }

    function buildQueryUrl(endpoint, paramsMap) {
      const url = new URL(endpoint, window.location.origin);
      Object.entries(paramsMap).forEach(([key, value]) => {
        if (value !== undefined && value !== null && String(value).trim() !== '') {
          url.searchParams.set(key, value);
        }
      });
      return url.toString();
    }

    function rerender() {
      createCategoryButtons(API_DATA.tags || {});
      docsContainer.innerHTML = '';

      const keyword = searchInput.value.trim().toLowerCase();
      const routes = normalizeRoutes().filter(route => {
        const categoryMatch = CURRENT_CATEGORY === 'all' || route.category === CURRENT_CATEGORY;
        const text = [route.name, route.endpoint, route.description, route.category].join(' ').toLowerCase();
        return categoryMatch && (!keyword || text.includes(keyword));
      });

      if (!routes.length) {
        docsContainer.innerHTML = `
          <div class="neo-card rounded-3xl p-8 text-center text-black/60 bg-white font-bold">
            <div class="text-4xl mb-2">🔍</div>
            Tidak ada endpoint yang cocok.
          </div>`;
        return;
      }

      routes.forEach(route => {
        const node = template.content.cloneNode(true);
        const methodBadge  = node.querySelector('.method-badge');
        const endpointUrl  = node.querySelector('.endpoint-url');
        const endpointName = node.querySelector('.endpoint-name');
        const endpointDesc = node.querySelector('.endpoint-description');
        const paramsWrapper = node.querySelector('.params-wrapper');
        const paramsList   = node.querySelector('.params-list');
        const copyBtn      = node.querySelector('.copy-btn');
        const toggleTryBtn = node.querySelector('.toggle-try-btn');
        const tryPanel     = node.querySelector('.try-panel');
        const dynamicForm  = node.querySelector('.dynamic-form');
        const sendBtn      = node.querySelector('.send-btn');
        const clearBtn     = node.querySelector('.clear-btn');
        const requestUrl   = node.querySelector('.request-url');
        const responseBox  = node.querySelector('.response-box');

        methodBadge.textContent = route.method;
        methodBadge.className = `method-badge text-sm font-black px-4 py-2 rounded-xl neo-badge uppercase tracking-wider ${methodBadgeClass(route.method)}`;
        endpointUrl.textContent = route.endpoint;
        endpointName.textContent = `${route.name} • ${route.category}`;
        endpointDesc.textContent = route.description || '-';

        const params = Array.isArray(route.params) ? route.params : [];
        if (params.length > 0) {
          paramsWrapper.classList.remove('hidden');
          params.forEach(param => {
            const view = document.createElement('div');
            view.className = 'bg-gray-50 border-4 border-black rounded-2xl p-4 shadow-[4px_4px_0_#000]';
            view.innerHTML = `
              <div class="flex items-center gap-2 mb-2">
                <span class="font-mono font-black text-lg">${param.name}</span>
                <span class="text-xs font-black px-3 py-1 rounded-lg border-2 border-black ${param.required ? 'bg-[#fb7185]' : 'bg-gray-200'} uppercase">${param.required ? 'required' : 'optional'}</span>
              </div>
              <p class="text-sm font-medium text-black/70">${param.description || '-'}</p>`;
            paramsList.appendChild(view);
          });
        }

        const inputRefs = {};
        params.forEach(param => {
          const wrapper = document.createElement('div');
          wrapper.className = 'flex flex-col gap-2';
          const label = document.createElement('label');
          label.className = 'text-sm font-black uppercase tracking-wide';
          label.textContent = `${param.name}${param.required ? ' *' : ''}`;
          const input = document.createElement('input');
          input.type = 'text';
          input.placeholder = param.description || param.name;
          input.className = 'neo-input px-4 py-3 rounded-xl text-black placeholder:text-black/40 font-bold';
          wrapper.appendChild(label);
          wrapper.appendChild(input);
          dynamicForm.appendChild(wrapper);
          inputRefs[param.name] = input;
        });

        const updatePreviewUrl = () => {
          const map = {};
          Object.entries(inputRefs).forEach(([k, v]) => map[k] = v.value);
          requestUrl.textContent = buildQueryUrl(route.endpoint, map);
        };
        Object.values(inputRefs).forEach(input => input.addEventListener('input', updatePreviewUrl));
        updatePreviewUrl();

        copyBtn.onclick = async () => {
          try {
            await navigator.clipboard.writeText(window.location.origin + route.endpoint);
            const original = copyBtn.innerHTML;
            copyBtn.innerHTML = '<span class="text-green-600">✓</span> Copied!';
            copyBtn.classList.add('bg-green-100');
            setTimeout(() => { 
              copyBtn.innerHTML = original;
              copyBtn.classList.remove('bg-green-100');
            }, 1400);
          } catch {
            copyBtn.innerHTML = '❌ Failed';
            setTimeout(() => { copyBtn.innerHTML = original; }, 1400);
          }
        };

        toggleTryBtn.onclick = () => tryPanel.classList.toggle('hidden');
        clearBtn.onclick = () => {
          Object.values(inputRefs).forEach(input => input.value = '');
          responseBox.textContent = 'Form dibersihkan.';
          updatePreviewUrl();
        };

        sendBtn.onclick = async () => {
          const paramsMap = {};
          Object.entries(inputRefs).forEach(([k, v]) => paramsMap[k] = v.value);
          const finalUrl = buildQueryUrl(route.endpoint, paramsMap);
          requestUrl.textContent = finalUrl;
          responseBox.textContent = '⏳ Loading...';
          try {
            const res = await fetch(finalUrl, { method: route.method || 'GET' });
            const ct = res.headers.get('content-type') || '';
            if (ct.includes('application/json')) {
              const json = await res.json();
              responseBox.textContent = JSON.stringify(json, null, 2);
            } else {
              responseBox.textContent = await res.text();
            }
          } catch (err) {
            responseBox.textContent = 'Request failed:\n' + String(err);
          }
        };

        docsContainer.appendChild(node);
      });
    }

    async function initDocs() {
      try {
        const res = await fetch('/src/config.json?t=' + Date.now());
        const data = await res.json();
        API_DATA = data;

        document.getElementById('doc-title').textContent = data.title || 'EpannAPIs Docs';
        document.getElementById('doc-description').textContent = data.description || '-';
        document.getElementById('doc-version').textContent = data.version || '-';
        document.getElementById('doc-version-text').textContent = data.version || '-';
        document.getElementById('doc-updated').textContent = data.lastUpdated
          ? new Date(data.lastUpdated).toLocaleString('id-ID') : '-';

        rerender();
      } catch (err) {
        docsContainer.innerHTML = `
          <div class="neo-card rounded-3xl p-8 text-center bg-white border-red-500">
            <div class="text-4xl mb-2">⚠️</div>
            <div class="font-black text-red-600 mb-2">Gagal memuat dokumentasi</div>
            <div class="text-black/60 text-sm font-bold">${String(err)}</div>
          </div>`;
      }
    }

    searchInput.addEventListener('input', rerender);
    initDocs();
  </script>
</body>
</html>
